<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My TV Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eeedea;
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9a9a97;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark: #3C3489;
    --purple-text: #26215C;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  .page-header { margin-bottom: 2rem; }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.15;
  }
  .page-header h1 em { font-style: italic; color: var(--purple); }
  .page-header p { font-size: 14px; color: var(--text2); margin-top: 6px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 1rem;
    border: 0.5px solid var(--border);
  }
  .stat-val { font-size: 26px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .add-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .add-row {
    display: grid;
    grid-template-columns: 1fr 140px auto auto;
    gap: 8px;
    align-items: center;
  }
  .add-card input,
  .add-card select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    height: 38px;
    padding: 0 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-md);
    background: var(--bg2);
    color: var(--text);
    width: 100%;
    outline: none;
  }
  .add-card input:focus,
  .add-card select:focus { border-color: var(--purple); }

  .star-row { display: flex; gap: 4px; align-items: center; }
  .star { width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .star svg { width: 18px; height: 18px; transition: transform 0.1s; }
  .star:hover svg { transform: scale(1.15); }

  .add-btn {
    height: 38px;
    padding: 0 18px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--purple-dark); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .f-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .f-btn:hover { border-color: var(--purple); color: var(--purple); }
  .f-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

  .sort-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
  .sort-row label { font-size: 12px; color: var(--text2); }
  .sort-row select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    height: 32px;
    padding: 0 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; padding-right: 6px; }
  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .del-btn:hover { color: #E24B4A; }

  .genre-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .g-drama    { background: #EEEDFE; color: #3C3489; }
  .g-comedy   { background: #FAEEDA; color: #633806; }
  .g-thriller { background: #FAECE7; color: #712B13; }
  .g-scifi    { background: #E1F5EE; color: #085041; }
  .g-crime    { background: #FBEAF0; color: #72243E; }
  .g-reality  { background: #EAF3DE; color: #27500A; }
  .g-other    { background: #F1EFE8; color: #5F5E5A; }

  .rating-dots { display: flex; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot.on { background: var(--purple); }
  .dot.off { background: #D3D1C7; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text3);
    font-size: 14px;
  }
  .empty-icon { width: 44px; height: 44px; margin: 0 auto 1rem; opacity: 0.25; }

  @media (max-width: 540px) {
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row .star-row { grid-column: 1 / -1; justify-content: center; }
    .add-btn { grid-column: 1 / -1; }
    .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>My <em>watched</em> collection</h1>
    <p>Rate every show you've finished — your personal TV log</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Shows watched</div></div>
    <div class="stat"><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">Avg rating</div></div>
    <div class="stat"><div class="stat-val" id="s-top">—</div><div class="stat-lbl">Top genre</div></div>
  </div>

  <div class="add-card">
    <div class="add-row">
      <input id="inp-title" placeholder="Show title..." />
      <select id="inp-genre">
        <option value="drama">Drama</option>
        <option value="comedy">Comedy</option>
        <option value="thriller">Thriller</option>
        <option value="scifi">Sci-fi</option>
        <option value="crime">Crime</option>
        <option value="reality">Reality</option>
        <option value="other">Other</option>
      </select>
      <div class="star-row" id="stars"></div>
      <button class="add-btn" onclick="addShow()">+ Add</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="sort-row">
    <label>Sort by</label>
    <select id="sort-sel" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="highest">Highest rated</option>
      <option value="lowest">Lowest rated</option>
      <option value="alpha">A → Z</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
  const SEEDS = [
    {id:1, title:'Succession',       genre:'drama',    rating:5},
    {id:2, title:'The Bear',         genre:'drama',    rating:5},
    {id:3, title:'Severance',        genre:'scifi',    rating:4},
    {id:4, title:'The White Lotus',  genre:'thriller', rating:4},
    {id:5, title:'Abbott Elementary',genre:'comedy',   rating:4},
    {id:6, title:'The Diplomat',     genre:'drama',    rating:3},
  ];

  let shows = [];
  let pendingRating = 3;
  let activeFilter = 'all';

  function load() {
    try {
      const raw = localStorage.getItem('tv-shows');
      shows = raw ? JSON.parse(raw) : SEEDS;
    } catch(e) { shows = SEEDS; }
    render();
  }

  function save() {
    try { localStorage.setItem('tv-shows', JSON.stringify(shows)); } catch(e) {}
  }

  function addShow() {
    const t = document.getElementById('inp-title').value.trim();
    if (!t) { document.getElementById('inp-title').focus(); return; }
    shows.unshift({ id: Date.now(), title: t, genre: document.getElementById('inp-genre').value, rating: pendingRating });
    document.getElementById('inp-title').value = '';
    pendingRating = 3;
    renderStars();
    save();
    render();
  }

  function deleteShow(id) {
    if (!confirm('Remove this show?')) return;
    shows = shows.filter(s => s.id !== id);
    save(); render();
  }

  function renderStars() {
    const c = document.getElementById('stars');
    c.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const d = document.createElement('div');
      d.className = 'star';
      const filled = i <= pendingRating;
      d.innerHTML = `<svg viewBox="0 0 16 16"><polygon points="8,1 10.2,5.8 15.5,6.3 11.5,10 12.7,15.2 8,12.5 3.3,15.2 4.5,10 0.5,6.3 5.8,5.8" fill="${filled ? '#534AB7' : 'none'}" stroke="${filled ? '#534AB7' : '#B4B2A9'}" stroke-width="1.2" stroke-linejoin="round"/></svg>`;
      d.onclick = (v => () => { pendingRating = v; renderStars(); })(i);
      c.appendChild(d);
    }
  }

  function renderFilters() {
    const genres = ['all', ...new Set(shows.map(s => s.genre))];
    const c = document.getElementById('filters');
    c.innerHTML = '';
    genres.forEach(g => {
      const b = document.createElement('button');
      b.className = 'f-btn' + (activeFilter === g ? ' active' : '');
      b.textContent = g === 'all' ? 'All shows' : g.charAt(0).toUpperCase() + g.slice(1);
      b.onclick = () => { activeFilter = g; render(); };
      c.appendChild(b);
    });
  }

  function getSorted(list) {
    const s = document.getElementById('sort-sel').value;
    const copy = [...list];
    if (s === 'highest') return copy.sort((a,b) => b.rating - a.rating);
    if (s === 'lowest')  return copy.sort((a,b) => a.rating - b.rating);
    if (s === 'alpha')   return copy.sort((a,b) => a.title.localeCompare(b.title));
    return copy;
  }

  function renderGrid() {
    const filtered = activeFilter === 'all' ? shows : shows.filter(s => s.genre === activeFilter);
    const sorted = getSorted(filtered);
    const c = document.getElementById('grid');
    if (!sorted.length) {
      c.innerHTML = `<div class="empty"><svg class="empty-icon" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10" width="36" height="26" rx="3"/><circle cx="22" cy="23" r="6"/><line x1="14" y1="6" x2="14" y2="10"/><line x1="30" y1="6" x2="30" y2="10"/></svg>No shows here yet</div>`;
      return;
    }
    c.innerHTML = sorted.map(s => {
      const dots = Array.from({length:5}, (_,i) => `<div class="dot ${i < s.rating ? 'on' : 'off'}"></div>`).join('');
      return `<div class="card">
        <div class="card-top">
          <div class="card-title">${s.title}</div>
          <button class="del-btn" onclick="deleteShow(${s.id})">×</button>
        </div>
        <div class="genre-badge g-${s.genre}">${s.genre}</div>
        <div class="rating-dots">${dots}</div>
      </div>`;
    }).join('');
  }

  function renderStats() {
    const n = shows.length;
    document.getElementById('s-total').textContent = n;
    if (!n) { document.getElementById('s-avg').textContent = '—'; document.getElementById('s-top').textContent = '—'; return; }
    document.getElementById('s-avg').textContent = (shows.reduce((a,s) => a + s.rating, 0) / n).toFixed(1);
    const freq = {};
    shows.forEach(s => freq[s.genre] = (freq[s.genre] || 0) + 1);
    const top = Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
    document.getElementById('s-top').textContent = top.charAt(0).toUpperCase() + top.slice(1);
  }

  function render() { renderFilters(); renderGrid(); renderStats(); }

  document.getElementById('inp-title').addEventListener('keydown', e => { if (e.key === 'Enter') addShow(); });
  renderStars();
  load();
</script>
</body>
</html>
